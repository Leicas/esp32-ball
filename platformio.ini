; ── Virtual Rolling Stone — ESP32-C6 Haptic Firmware ─────────────────────────
;
; Two environments on the same ESP32-C6 chip.
; Physics, IMU driver, and serial protocol are identical.
; Only pins and haptic output driver differ.
;
;   feather   — STEMMA BNO085 (IO19/18) + I2S audio amp + NeoPixel
;   hbridge   — onboard BNO085 (IO8/9)  + H-bridge 22 kHz PWM synthesis

; ── Adafruit Feather ESP32-C6 ─────────────────────────────────────────────────
[env:feather]
platform = espressif32
board = esp32-c6-devkitm-1
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
framework = arduino
extra_scripts = pre:fix_toolchain_path.py
upload_protocol = esptool
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    adafruit/Adafruit BNO08x   @ ^1.2.3
    adafruit/Adafruit BusIO    @ ^1.16.2
    adafruit/Adafruit NeoPixel @ ^1.12.3

; ── H-bridge target (CodeCell ESP32-C6 Drive, 8 MB flash) ────────────────────
; BNO085 onboard (I2C SDA=IO8 SCL=IO9).
; Haptic: esp_timer at 22 kHz drives LEDC PWM.
;   Rolling rumble → IN2 (IO21, minus pin) — negative arch wavetable
;   Impact pulse   → IN1 (IO22, plus  pin) — short positive burst
[env:hbridge]
platform = espressif32
board = esp32-c6-devkitm-1
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_upload.flash_size = 8MB
framework = arduino
extra_scripts = pre:fix_toolchain_path.py
upload_protocol = esptool
build_flags =
    -DHBRIDGE
    -DARDUINO_ESP32C6_DEV
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    adafruit/Adafruit BNO08x   @ ^1.2.3
    adafruit/Adafruit BusIO    @ ^1.16.2
